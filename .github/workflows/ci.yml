name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Unit tests
        run: bun test tests/unit

      - name: Integration tests
        run: bun test tests/integration

      - name: E2E tests
        run: bun test tests/e2e

      - name: Coverage
        run: bun test --coverage tests/unit tests/integration tests/e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: |
            build/
            bin/

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Configure npm for OIDC
        run: |
          echo "//registry.npmjs.org/:_authToken=" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

      - name: Install dependencies
        run: bun install

      - name: Build
        run: make build

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          [ "$TAG" = "$PKG" ] || (echo "Tag v$TAG != package.json $PKG" && exit 1)
          echo "Version: $PKG"

      - name: Publish
        run: npx npm@latest publish --provenance --access public

      - name: Verify npm publish
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Waiting for npm registry to reflect v$TAG..."
          for i in $(seq 1 10); do
            LATEST=$(npm view @asymmetric-effort/jsonlint version 2>/dev/null || echo "")
            if [ "$LATEST" = "$TAG" ]; then
              echo "Verified: @asymmetric-effort/jsonlint@$TAG is live on npm"
              exit 0
            fi
            echo "Attempt $i/10: latest=$LATEST, expected=$TAG"; sleep 5
          done
          echo "WARNING: npm may still be propagating"
