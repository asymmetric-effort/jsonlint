name: Deploy Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-site:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Build site
        working-directory: site
        run: npx vite build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build-site
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  pdv:
    name: Post-Deployment Verification
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install PDV dependencies
        working-directory: site/e2e
        run: npm install

      - name: Install Playwright browsers
        working-directory: site/e2e
        run: npx playwright install --with-deps chromium

      - name: Wait for CDN propagation
        run: |
          for i in $(seq 1 30); do
            JS=$(curl -sk "https://jsonlint.asymmetric-effort.com/?_cb=$(date +%s%N)" | grep -oP 'assets/index-[^"]+\.js' || true)
            if [ -n "$JS" ]; then
              echo "Site content confirmed after ${i}0s"
              exit 0
            fi
            echo "Attempt $i/30..."; sleep 10
          done
          echo "WARNING: CDN may still be propagating"

      - name: Run PDV tests
        working-directory: site/e2e
        run: npx playwright test
        env:
          SITE_URL: https://jsonlint.asymmetric-effort.com

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pdv-report
          path: site/e2e/playwright-report/
          retention-days: 7
