<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>jsonlint</title>
    <script>
      // SPA redirect: convert path to hash for GitHub Pages
      var path = window.location.pathname;
      if (path !== "/" && path !== "/index.html") {
        window.location.replace("/#" + path);
      }
    </script>
  </head>

</html>
